<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>leaflet.countries — Simple Usage</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    #panel {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 13px;
      max-width: 280px;
    }
    #panel code {
      display: block;
      background: #f3f4f6;
      border-radius: 4px;
      padding: 6px 8px;
      margin-top: 8px;
      font-size: 12px;
      white-space: pre;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../vendor/leaflet.regions.js"></script>
  <script src="../src/leaflet.countries.js"></script>
  <script>
    var map = L.map('map').setView([48, 8], 5);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // Natural Earth 1:110m Admin 0 Countries. Public Domain. https://www.naturalearthdata.com/
    L.countriesLayer({
      geoJsonUrl: 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson',
      defaultVisible: false,
      data: {
        FR: { name: 'France',      color: '#3b82f6', labelLatLng: [46.7, 2.5  ], popupContent: '<b>France</b> More info here' },
        DE: { name: 'Germany',     color: '#22c55e' },
        CH: { name: 'Switzerland', color: '#ef4444' }
      }
    }).addTo(map);
  </script>
</body>
</html>
