<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual Label Placement Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    #panel {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 13px;
      max-width: 320px;
    }
    #panel p { margin: 6px 0 0; color: #555; }
    button {
      margin-top: 10px;
      padding: 6px 14px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div id="panel">
    <strong>Manual Label Placement</strong>
    <p>Argentina's label defaults to the geographic center of its bounding box — which lands in the south due to its long shape.</p>
    <button id="fixBtn">Fix Argentina's label</button>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../vendor/leaflet.regions.js"></script>
  <script src="../src/leaflet.countries.js"></script>
  <script>
    function neIso2(props) {
      var a2 = props.ISO_A2 || '';
      if (a2 === '-99') {
        var type = props.TYPE || '';
        if (type === 'Sovereign country' || type === 'Country') a2 = props.ISO_A2_EH || '';
      }
      return String(a2).toUpperCase();
    }

    function keepIsoCountryFeatures(geojson) {
      if (!geojson || !Array.isArray(geojson.features)) return geojson;
      geojson.features = geojson.features.filter(function (feature) {
        var props = feature && feature.properties ? feature.properties : {};
        return /^[A-Z]{2}$/.test(neIso2(props));
      });
      return geojson;
    }

    // Zoomed to Argentina to start
    var map = L.map('map').setView([-38, -65], 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    var countriesLayer = null;

    // Natural Earth 1:110m Admin 0 Countries. Public Domain. https://www.naturalearthdata.com/
    fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson')
      .then(function (r) { return r.json(); })
      .then(function (geojson) {
        var filtered = keepIsoCountryFeatures(geojson);

        countriesLayer = L.countriesLayer({
          geoJson: filtered,
          featureKey: function (feature) { return neIso2(feature.properties || {}); },
          label: function (feature) {
            var p = feature.properties || {};
            return p.NAME || p.ADMIN || '';
          },
          color: '#94a3b8',
          data: {
            // Argentina: no labelLatLng — label falls to the geographic bounding-box center,
            // which sits too far south because of the country's elongated shape.
            //
            // To fix this from the start, add:
            //   AR: { color: '#3b82f6', labelLatLng: [-34, -64] }
            AR: {
              color: '#3b82f6',
              popupContent: '<b>Argentina</b>'
            }
          }
        }).addTo(map);
      })
      .catch(function (err) { console.error('Failed to load GeoJSON:', err); });

    document.getElementById('fixBtn').addEventListener('click', function () {
      if (!countriesLayer) return;

      // Apply labelLatLng to move the label to the populated center of Argentina
      var countries = countriesLayer.getCountries();
      countries['AR'] = countries['AR'] || {};
      countries['AR'].labelLatLng = [-34, -64];
      countriesLayer.refresh();

      this.textContent = 'Label fixed!';
      this.disabled = true;

      document.querySelector('#panel p').textContent =
        'Label moved to the populated center. Set labelLatLng: [-34, -64] in your data to start here.';
    });
  </script>
</body>
</html>
